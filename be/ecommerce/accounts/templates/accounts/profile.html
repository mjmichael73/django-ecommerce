{% extends "shop/base.html" %}

{% block title %}Profile · Studio Market{% endblock %}

{% block content %}
<div class="page-head">
  <h1 class="page-head__title">Your profile</h1>
  <p class="page-head__crumb">Name and email used at checkout</p>
</div>
<div class="auth-stack">
  <div class="order-form-panel auth-panel">
    <p class="auth-panel__meta">Signed in as <strong>{{ user.username }}</strong></p>
    <form method="post" class="order-form">
      {% csrf_token %}
      {{ form.as_p }}
      <p><input type="submit" value="Save changes"></p>
    </form>
    <p class="auth-panel__footer"><a href="{% url 'accounts:order_list' %}">View order history</a></p>
  </div>
</div>
{% endblock %}
