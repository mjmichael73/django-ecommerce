{% extends "shop/base.html" %}

{% block title %}Log in · Studio Market{% endblock %}

{% block content %}
<div class="page-head">
  <h1 class="page-head__title">Log in</h1>
  <p class="page-head__crumb">Access your profile and order history</p>
</div>
<div class="auth-stack">
  <div class="order-form-panel auth-panel">
    <form method="post" class="order-form" action="{% url 'accounts:login' %}">
      {% csrf_token %}
      {{ form.as_p }}
      <p><input type="submit" value="Log in"></p>
    </form>
    <p class="auth-panel__footer">No account? <a href="{% url 'accounts:register' %}">Register</a></p>
  </div>
</div>
{% endblock %}
