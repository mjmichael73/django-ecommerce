# Ensures collectstatic produces invoice PDF assets at STATIC_ROOT (see ecommerce/pdf_stylesheet.py).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  staticfiles:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: ecommerce.settings
      SECRET_KEY: ci-collectstatic-only-not-for-production
    defaults:
      run:
        working-directory: be/ecommerce
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: be/requirements.txt

      - name: Install WeasyPrint OS dependencies (match Dockerfile)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b libharfbuzz-subset0 \
            libffi-dev shared-mime-info

      - name: Install Python dependencies
        run: pip install -r ../requirements.txt

      - name: collectstatic
        run: python manage.py collectstatic --noinput

      - name: Invoice PDF stylesheet must exist in STATIC_ROOT
        run: test -f static/css/pdf.css
