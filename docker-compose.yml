services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecommerce-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    environment:
      # yes = AOF + volume (survives container restarts; good for Celery result backend).
      # no = in-memory only (no appendonly; resets on container recreate).
      REDIS_AOF: ${REDIS_AOF:-yes}
    volumes:
      - redis_data:/data
    command:
      - /bin/sh
      - -c
      - |
        set -e
        if [ "$$REDIS_AOF" = "no" ]; then
          exec redis-server --save "" --appendonly no
        else
          exec redis-server --appendonly yes --appendfsync everysec
        fi
    networks:
      - ecommerce-net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13.0-management-alpine
    restart: unless-stopped
    tty: true
    ports:
      - '5672:5672'
      - '15672:15672'
      - '15692:15692'
      - '25672:25672'
    networks:
      - ecommerce-net
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '8000:8000'
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required in .env - run make env}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce}
      POSTGRES_HOST: db
      POSTGRES_PORT: '5432'
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      DJANGO_BEHIND_PROXY: ${DJANGO_BEHIND_PROXY:-}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-false}
      SECURE_HSTS_SECONDS: ${SECURE_HSTS_SECONDS:-0}
      SECURE_HSTS_INCLUDE_SUBDOMAINS: ${SECURE_HSTS_INCLUDE_SUBDOMAINS:-false}
      SECURE_HSTS_PRELOAD: ${SECURE_HSTS_PRELOAD:-false}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-true}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce-net

  reverse-proxy:
    profiles:
      - reverse-proxy
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_started
    networks:
      - ecommerce-net

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ['celery', '-A', 'ecommerce', 'worker', '-l', 'info']
    healthcheck:
      test: ['CMD-SHELL', 'celery -A ecommerce inspect ping -t 10']
      interval: 30s
      timeout: 15s
      retries: 4
      start_period: 90s
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required in .env - run make env}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce}
      POSTGRES_HOST: db
      POSTGRES_PORT: '5432'
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      DJANGO_BEHIND_PROXY: ${DJANGO_BEHIND_PROXY:-}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-false}
      SECURE_HSTS_SECONDS: ${SECURE_HSTS_SECONDS:-0}
      SECURE_HSTS_INCLUDE_SUBDOMAINS: ${SECURE_HSTS_INCLUDE_SUBDOMAINS:-false}
      SECURE_HSTS_PRELOAD: ${SECURE_HSTS_PRELOAD:-false}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-true}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      SKIP_COLLECTSTATIC: '1'
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      web:
        condition: service_started
    networks:
      - ecommerce-net

  flower:
    profiles:
      - flower
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # Bypass entrypoint.sh (no migrate/collectstatic for a monitoring-only process).
    entrypoint: ['celery', '-A', 'ecommerce', 'flower', '--address=0.0.0.0', '--port=5555']
    ports:
      - '5555:5555'
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required in .env - run make env}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce}
      POSTGRES_HOST: db
      POSTGRES_PORT: '5432'
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      DJANGO_BEHIND_PROXY: ${DJANGO_BEHIND_PROXY:-}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-false}
      SECURE_HSTS_SECONDS: ${SECURE_HSTS_SECONDS:-0}
      SECURE_HSTS_INCLUDE_SUBDOMAINS: ${SECURE_HSTS_INCLUDE_SUBDOMAINS:-false}
      SECURE_HSTS_PRELOAD: ${SECURE_HSTS_PRELOAD:-false}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-true}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_healthy
    networks:
      - ecommerce-net

volumes:
  postgres_data:
  media_data:
  redis_data:

networks:
  ecommerce-net:
    driver: bridge
